<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="userscript-version" content="3">
<title>Steam Workshop Scraper</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
:root { --pico-font-size: 85%; }
body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
header { padding: .5rem 1rem; border-bottom: 1px solid var(--pico-muted-border-color); display: flex; justify-content: space-between; align-items: center; }
main { flex: 1; display: flex; gap: .5rem; padding: .5rem; overflow: hidden; }
#results-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: .5rem; overflow-y: auto; align-content: start; flex: 1; min-height: 0; }
.grid-cell { cursor: pointer; padding: .5em; border: 1px solid var(--pico-muted-border-color); border-radius: 4px; display: flex; flex-direction: column; gap: .25em; }
.grid-cell:hover { border-color: var(--pico-primary-hover-background); }
.grid-cell.selected { border-color: var(--pico-primary-background); background: color-mix(in srgb, var(--pico-primary-background) 20%, transparent); }
.grid-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 3px; background: var(--pico-muted-border-color); }
.grid-img-placeholder { width: 100%; aspect-ratio: 16/10; border-radius: 3px; background: var(--pico-muted-border-color); display: flex; align-items: center; justify-content: center; color: var(--pico-muted-color); font-size: .8rem; }
.grid-title { font-size: .82rem; font-weight: bold; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.grid-meta { font-size: .7rem; color: var(--pico-muted-color); display: flex; flex-wrap: wrap; gap: .2em .5em; }
.grid-scores { font-size: .7rem; font-weight: bold; display: flex; gap: .5em; }
.queued .grid-title::before { content: '\2605 '; color: #44aa44; }
#right-pane { flex: 0 0 360px; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid var(--pico-muted-border-color); padding-left: .5rem; }
#search-builder { flex-shrink: 0; margin-bottom: .5rem; }
.filter-row { display: flex; gap: .25rem; align-items: center; margin-bottom: .25rem; }
.filter-row select, .filter-row input { padding: 2px 4px; }
.filter-row select.field-select { flex: 2; }
.filter-row select.op-select { flex: 2; }
.filter-row input.value-input { flex: 3; }
.filter-row button { padding: 2px 6px; min-width: 2rem; }
#detail-pane { flex: 1; overflow-y: auto; min-height: 0; }
.stat-row { margin-bottom: .25rem; }
.stat-label { color: var(--pico-muted-color); }
.stat-wilson { font-weight: bold; }
.wilson-p99 { color: #ffd700; }
.wilson-p99::before { content: '! '; }
.wilson-p99::after { content: ' !'; }
.wilson-p90 { color: #ffd700; }
.wilson-p50 { color: #e0e0e0; }
.wilson-low { color: #888; }
#port-display { font-size: .8rem; color: var(--pico-muted-color); }
#load-more { width: 100%; margin-top: .5rem; display: none; }
@media (max-width: 768px) {
  main { flex-direction: column; }
  #right-pane { flex: 0 0 auto; border-left: none; border-top: 1px solid var(--pico-muted-border-color); padding-left: 0; padding-top: .5rem; }
  #results-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
</style>
</head>
<body>
<header>
  <h1 style="margin:0;font-size:1.2rem">Workshop Scraper</h1>
  <span id="port-display"></span>
</header>
<main>
  <div id="results-pane">
    <div id="results-grid"></div>
    <button id="load-more">Load more...</button>
  </div>
  <div id="right-pane">
    <div id="search-builder">
      <div id="filter-rows"></div>
      <div style="display:flex;gap:.25rem;margin-top:.25rem">
        <button id="btn-search" style="flex:2">Search</button>
        <button id="btn-save-filter" title="Save for scraper">&#x1F4BE;</button>
        <button id="btn-and" style="flex:1">AND</button>
        <button id="btn-or" style="flex:1">OR</button>
      </div>
      <div style="display:flex;gap:.25rem;margin-top:.25rem">
        <select id="sort-by" style="flex:2">
          <option value="title">Title</option>
          <option value="file_size">File Size</option>
          <option value="subscriptions">Subscriptions</option>
          <option value="favorited">Favorites</option>
          <option value="views">Views</option>
          <option value="workshop_id">Workshop ID</option>
          <option value="time_created">Created Time</option>
          <option value="time_updated">Updated Time</option>
          <option value="wilson_subscription_score">Subscriber Score</option>
          <option value="wilson_favorite_score">Favorite Score</option>
        </select>
        <select id="sort-order" style="flex:1">
          <option value="ASC">ASC</option>
          <option value="DESC">DESC</option>
        </select>
        <a href="/api/stats" id="btn-stats" style="flex:0.5">&#x1F4CA;</a>
      </div>
    </div>
    <div id="detail-pane">
      <p class="stat-label">Select an item to see details.</p>
    </div>
  </div>
</main>

<script>
const FIELD_OPS = {
  text: ['contains','does_not_contain','is','is_not','is_empty','is_not_empty'],
  numeric: ['is','is_not','gt','lt','gte','lte','is_empty','is_not_empty','percentile'],
  id: ['is','is_not']
};
const NUMERIC_FIELDS = ['File Size','Subs','Favs','Views','Language ID','Subscriber Score','Favorite Score'];
const ID_FIELDS = ['Author ID','Workshop ID','AppID'];
const ALL_FIELDS = ['Title','Description','Filename','Tags','Author ID','File Size','Subs','Favs','Views','Workshop ID','AppID','Language ID','Subscriber Score','Favorite Score','Full Text'];

let currentOffset = 0, hasMore = true, loading = false, cutoffs = {};
let _listPollTimer = null;

function updateOps(row) {
  const field = row.querySelector('.field-select').value;
  const opSelect = row.querySelector('.op-select');
  const cur = opSelect.value;
  let ops;
  if (ID_FIELDS.includes(field)) ops = FIELD_OPS.id;
  else if (NUMERIC_FIELDS.includes(field)) ops = FIELD_OPS.numeric;
  else ops = FIELD_OPS.text;
  opSelect.innerHTML = ops.map(o => `<option value="${o}">${o.replace(/_/g,' ')}</option>`).join('');
  if (ops.includes(cur)) opSelect.value = cur;
}

function addRow(logic) {
  const container = document.getElementById('filter-rows');
  const div = document.createElement('div');
  div.className = 'filter-row';
  if (logic) div.dataset.logic = logic;
  div.innerHTML = `
    <select class="field-select" onchange="updateOps(this.parentElement)">${ALL_FIELDS.map(f => `<option value="${f}">${f}</option>`).join('')}</select>
    <select class="op-select"></select>
    <input class="value-input" type="text" placeholder="value">
    <button onclick="removeRow(this.parentElement)">&#x2715;</button>
  `;
  container.appendChild(div);
  updateOps(div);
}

function removeRow(row) { row.remove(); }

function getFilters() {
  const rows = document.querySelectorAll('#filter-rows .filter-row');
  const filters = [];
  rows.forEach(r => {
    const op = r.querySelector('.op-select').value;
    let val = r.querySelector('.value-input').value;
    if (op === 'percentile') {
      const n = parseInt(val, 10);
      if (isNaN(n)) val = '0';
      else val = String(Math.max(0, Math.min(99, n)));
      r.querySelector('.value-input').value = val;
    }
    const f = {field: r.querySelector('.field-select').value, op, value: val};
    if (r.dataset.logic) f.logic = r.dataset.logic;
    filters.push(f);
  });
  return filters;
}

async function loadCutoffs() {
  const filters = getFilters();
  const resp = await fetch('/api/cutoffs', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filters})});
  cutoffs = await resp.json();
}

function wClass(score, key) {
  if (score == null) return 'wilson-low';
  const p99 = cutoffs[key + '_p99'] || 0;
  const p90 = cutoffs[key + '_p90'] || 0;
  const p50 = cutoffs[key + '_p50'] || 0;
  if (score >= p99) return 'wilson-p99';
  if (score >= p90) return 'wilson-p90';
  if (score >= p50) return 'wilson-p50';
  return 'wilson-low';
}

function fmtCount(n) {
  if (!n || n===0) return '0';
  n = Number(n);
  if (n < 1000) return String(n);
  if (n < 1000000) { const v=n/1000; return n<10000?v.toFixed(2)+'K':n<100000?v.toFixed(1)+'K':Math.round(v)+'K'; }
  const v=n/1000000; return n<10000000?v.toFixed(2)+'M':n<100000000?v.toFixed(1)+'M':Math.round(v)+'M';
}

function fmtSize(bytes) {
  if (!bytes) return '';
  const kb = bytes / 1024;
  if (kb < 1024) return kb.toFixed(1) + ' KB';
  const mb = kb / 1024;
  if (mb < 1024) return mb.toFixed(1) + ' MB';
  return (mb/1024).toFixed(1) + ' GB';
}

async function doSearch(reset = true) {
  if (loading) return;
  loading = true;
  if (reset) { _stopListPoll(); currentOffset = 0; hasMore = true; document.getElementById('results-grid').innerHTML = ''; loadCutoffs(); }

  const filters = getFilters();
  const resp = await fetch('/api/search', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({filters, sort_by: document.getElementById('sort-by').value, sort_order: document.getElementById('sort-order').value, offset: currentOffset, limit: 50})
  });
  const items = await resp.json();

  const grid = document.getElementById('results-grid');
  items.forEach(item => {
    const title = item.title_en || item.title || 'Untitled';
    const wfs = item.wilson_favorite_score != null ? (item.wilson_favorite_score*100).toFixed(1) : null;
    const wss = item.wilson_subscription_score != null ? (item.wilson_subscription_score*100).toFixed(1) : null;
    const size = fmtSize(item.file_size);

    let imgHtml;
    if (item.image_extension) {
      imgHtml = `<img class="grid-img" src="/images/${item.workshop_id}.${item.image_extension}" loading="lazy" alt="">`;
    } else {
      imgHtml = '<div class="grid-img-placeholder">no image</div>';
    }

    const div = document.createElement('div');
    div.className = 'grid-cell';
    div.setAttribute('data-wid', item.workshop_id);
    if (item.is_queued_for_subscription) div.classList.add('queued');
    div.innerHTML = `${imgHtml}
      <div class="grid-title">${title}</div>
      <div class="grid-meta">${size}</div>
      <div class="grid-scores">
        <span class="${wClass(item.wilson_subscription_score,'wilson_subscription')}">S ${wss!=null?wss+'%':'—'}</span>
        <span class="${wClass(item.wilson_favorite_score,'wilson_favorite')}">F ${wfs!=null?wfs+'%':'—'}</span>
      </div>`;
    div.onclick = () => showDetail(item.workshop_id);
    grid.appendChild(div);
  });

  currentOffset += items.length;
  hasMore = items.length >= 50;
  document.getElementById('load-more').style.display = hasMore ? 'block' : 'none';
  loading = false;

  if (reset && _listNeedsPoll(items)) {
    _startListPoll(filters, document.getElementById('sort-by').value, document.getElementById('sort-order').value);
  }
}

function _listNeedsPoll(items) {
  for (const item of items) {
    if ((item.translation_priority || 0) > 0) return true;
    if ((item.needs_image || 0) > 0 && !item.image_extension) return true;
  }
  return false;
}

let _listPollFilters = null, _listPollSortBy = null, _listPollSortOrder = null;

function _startListPoll(filters, sortBy, sortOrder) {
  _stopListPoll();
  _listPollFilters = filters;
  _listPollSortBy = sortBy;
  _listPollSortOrder = sortOrder;
  _listPollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/search', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({filters: _listPollFilters, sort_by: _listPollSortBy, sort_order: _listPollSortOrder, offset: 0, limit: currentOffset})
      });
      const items = await resp.json();
      if (!_listNeedsPoll(items)) { _stopListPoll(); }
      const grid = document.getElementById('results-grid');
      items.forEach(item => {
        const el = grid.querySelector(`.grid-cell[data-wid="${item.workshop_id}"]`);
        if (!el) return;
        const title = item.title_en || item.title || 'Untitled';
        const titleEl = el.querySelector('.grid-title');
        if (titleEl) titleEl.textContent = title;
        if (item.image_extension && !el.querySelector('.grid-img')) {
          const ph = el.querySelector('.grid-img-placeholder');
          if (ph) ph.outerHTML = `<img class="grid-img" src="/images/${item.workshop_id}.${item.image_extension}" loading="lazy" alt="">`;
        }
        const wfs = item.wilson_favorite_score != null ? (item.wilson_favorite_score*100).toFixed(1) : null;
        const wss = item.wilson_subscription_score != null ? (item.wilson_subscription_score*100).toFixed(1) : null;
        const scores = el.querySelector('.grid-scores');
        if (scores) scores.innerHTML = `
          <span class="${wClass(item.wilson_subscription_score,'wilson_subscription')}">S ${wss!=null?wss+'%':'—'}</span>
          <span class="${wClass(item.wilson_favorite_score,'wilson_favorite')}">F ${wfs!=null?wfs+'%':'—'}</span>`;
      });
    } catch(e) { /* poll error, keep trying */ }
  }, 10000);
}

function _stopListPoll() {
  if (_listPollTimer) { clearInterval(_listPollTimer); _listPollTimer = null; }
}

function renderDetail(item) {
  const pane = document.getElementById('detail-pane');
  const title = item.display_title || 'N/A';
  const creator = item.personaname_en || item.personaname || item.creator || 'N/A';
  const url = `https://steamcommunity.com/sharedfiles/filedetails/?id=${item.workshop_id}`;

  const wfs = item.wilson_favorite_score != null ? (item.wilson_favorite_score*100).toFixed(1) : null;
  const wss = item.wilson_subscription_score != null ? (item.wilson_subscription_score*100).toFixed(1) : null;

  const subs = item.subscriptions||0, lsubs = item.lifetime_subscriptions||0;
  const favs = item.favorited||0, lfavs = item.lifetime_favorited||0;
  const created = item.time_created ? new Date(item.time_created*1000).toISOString().slice(0,10) : 'N/A';
  const updated = item.time_updated && item.time_updated !== item.time_created ? new Date(item.time_updated*1000).toISOString().slice(0,10) : null;
  const tags = (()=>{try{const t=JSON.parse(item.tags||'[]');return Array.isArray(t)?t.join(', '):'None'}catch{return'None'}})();
  const size = item.file_size ? (item.file_size/1024/1024).toFixed(1)+' MB' : 'N/A';

  let desc = item.description_html || '';
  if (!desc && (item.short_description_en || item.short_description)) {
    desc = '<p>' + (item.short_description_en || item.short_description) + '</p>';
  }

  pane.innerHTML = `
    <h2><a href="${url}" target="_blank">${title}</a></h2>
    <p>by <b>${creator}</b> &mdash; <small>Workshop ID: ${item.workshop_id}</small></p>
    <p class="stat-wilson"><span class="${wClass(item.wilson_subscription_score,'wilson_subscription')}">Subscriber Score: ${wss!=null?wss+'%':'N/A'}</span> &nbsp; <span class="${wClass(item.wilson_favorite_score,'wilson_favorite')}">Favorite Score: ${wfs!=null?wfs+'%':'N/A'}</span></p>
    <div class="stat-row"><span class="stat-label">Created:</span> ${created}</div>
    <div class="stat-row"><span class="stat-label">Size:</span> ${size}</div>
    ${updated ? `<div class="stat-row"><span class="stat-label">Updated:</span> ${updated}</div>` : ''}
    <div class="stat-row"><span class="stat-label">Views:</span> ${(item.views||0).toLocaleString()}</div>
    <div class="stat-row"><span class="stat-label">Subs:</span> ${fmtCount(subs)} / ${fmtCount(lsubs)}</div>
    <div class="stat-row"><span class="stat-label">Favs:</span> ${fmtCount(favs)} / ${fmtCount(lfavs)}</div>
    <div class="stat-row"><span class="stat-label">Tags:</span> <small>${tags}</small></div>
    <p><a href="${url}" target="_blank">Open on Steam</a> &nbsp; <button onclick="doSubscribe(${item.workshop_id}, ${item.consumer_appid || 0});return false;">Subscribe</button></p>
    ${desc ? '<div style="border-left:3px solid var(--pico-muted-border-color);padding-left:.5rem;margin-top:.5rem">'+desc+'</div>' : ''}
  `;
}

let _detailPollWid = null, _detailPollTimer = null;

function _detailNeedsPoll(item) {
  return (item.translation_priority || 0) > 0;
}

function _startDetailPoll(wid, item) {
  _stopDetailPoll();
  if (!_detailNeedsPoll(item)) return;
  _detailPollWid = wid;
  _detailPollTimer = setInterval(async () => {
    try {
      const resp = await fetch('/api/item/' + wid);
      if (!resp.ok || wid !== _detailPollWid) { _stopDetailPoll(); return; }
      const updated = await resp.json();
      if (updated.error) { _stopDetailPoll(); return; }
      if (!_detailNeedsPoll(updated)) {
        renderDetail(updated);
        _stopDetailPoll();
      }
    } catch(e) { /* poll error, keep trying */ }
  }, 3000);
}

function _stopDetailPoll() {
  if (_detailPollTimer) { clearInterval(_detailPollTimer); _detailPollTimer = null; }
  _detailPollWid = null;
}

async function showDetail(wid) {
  _stopDetailPoll();
  const pane = document.getElementById('detail-pane');
  pane.innerHTML = '<p>Loading...</p>';
  try {
    const resp = await fetch('/api/item/' + wid);
    if (!resp.ok) {
      pane.innerHTML = `<p>Error loading item ${wid}: ${resp.status} ${resp.statusText}</p>`;
      return;
    }
    const item = await resp.json();
    if (item.error) { pane.innerHTML = '<p>Item not found.</p>'; return; }

  renderDetail(item);
  document.querySelectorAll('#results-grid .grid-cell').forEach(el => el.classList.remove('selected'));
  _startDetailPoll(wid, item);
  } catch(e) { pane.innerHTML = '<p>Error loading detail: ' + e.message + '</p>'; }
}

const US_RAW_URL = '/userscript/steam_subscribe.user.js';
const US_EXPECTED_VER = parseInt(document.querySelector('meta[name="userscript-version"]')?.content || '1', 10);

function _userscriptPresent() {
  const body = document.body;
  if (!body || !body.dataset.userscript) return false;
  const ver = parseInt(body.dataset.userscriptVer || '0', 10);
  if (ver < US_EXPECTED_VER) {
    const ok = confirm(
      `Your Subscribe Bridge userscript is outdated (v${ver}). The page expects v${US_EXPECTED_VER}.\n\n` +
      'Click OK to open the latest version for installation.'
    );
    if (ok) window.open(US_RAW_URL, '_blank');
    return false;
  }
  return true;
}

async function doSubscribe(wid, appid) {
  if (!appid) { alert('Item has no AppID — cannot subscribe.'); return; }

  if (!_userscriptPresent()) {
    const ok = confirm(
      'To subscribe directly from this page, install the Subscribe Bridge userscript:\n\n' +
      '1. Install Tampermonkey from your browser\'s extension store\n' +
      '2. Click OK to open the userscript — Tampermonkey will offer to install it\n' +
      '3. Visit steamcommunity.com once to capture your session\n\n' +
      'The script automates the same POST Steam uses for its own Subscribe button.'
    );
    if (ok) window.open(US_RAW_URL, '_blank');
    return;
  }

  let result;
  try {
    const resp = await fetch('/api/subscribe/' + wid, {method:'POST'});
    result = await resp.json();
  } catch(e) {
    result = {success: -1, message: 'Network error contacting server.'};
  }

  switch (result.success) {
    case 1:
      alert('Subscribed!');
      break;
    case 2:
      alert('Your Steam session has expired. Visit steamcommunity.com in this browser to refresh it, then reload this page.');
      break;
    case 15:
      alert('You do not have permission to subscribe to this item.\n\nYour Steam session may have expired. Visit steamcommunity.com and log in to refresh it.');
      break;
    case 25:
      alert('You have reached the 15,000 subscription limit.');
      break;
    default:
      alert(result.message || 'There was a problem subscribing. Please try again.');
  }
}

async function loadState() {
  try {
    const resp = await fetch('/api/state');
    const state = await resp.json();
    if (state.filters && state.filters.length) {
      document.getElementById('filter-rows').innerHTML = '';
      state.filters.forEach((f,i) => {
        const container = document.getElementById('filter-rows');
        const div = document.createElement('div');
        div.className = 'filter-row';
        if (i > 0 && f.logic) div.dataset.logic = f.logic;
        div.innerHTML = `
          <select class="field-select" onchange="updateOps(this.parentElement)">${ALL_FIELDS.map(fn => `<option value="${fn}" ${fn===f.field?'selected':''}>${fn}</option>`).join('')}</select>
          <select class="op-select"></select>
          <input class="value-input" type="text" value="${f.value||''}" placeholder="value">
          <button onclick="removeRow(this.parentElement)">&#x2715;</button>
        `;
        container.appendChild(div);
        updateOps(div);
        if (f.op) div.querySelector('.op-select').value = f.op;
      });
    }
    if (!document.getElementById('filter-rows').children.length) addRow();
    if (state.sort_by) document.getElementById('sort-by').value = state.sort_by;
    if (state.sort_order) document.getElementById('sort-order').value = state.sort_order;
  } catch(e) {}
  doSearch(true);
}

document.getElementById('load-more').onclick = () => doSearch(false);
document.getElementById('btn-search').onclick = () => doSearch(true);
document.getElementById('btn-and').onclick = () => addRow('AND');
document.getElementById('btn-or').onclick = () => addRow('OR');
document.getElementById('btn-save-filter').onclick = async () => {
  await fetch('/api/save_filter', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filters: getFilters()})});
  alert('Filter saved for scraper.');
};
document.getElementById('sort-by').onchange = () => doSearch(true);
document.getElementById('sort-order').onchange = () => doSearch(true);

document.addEventListener('blur', e => {
  if (!e.target.classList.contains('value-input')) return;
  const row = e.target.parentElement;
  if (!row) return;
  const opSelect = row.querySelector('.op-select');
  if (!opSelect || opSelect.value !== 'percentile') return;
  let v = parseInt(e.target.value, 10);
  if (isNaN(v)) { e.target.value = '0'; return; }
  v = Math.max(0, Math.min(99, v));
  e.target.value = String(v);
}, true);

loadState();
</script>
</body>
</html>
